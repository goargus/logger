services:
  db:
    image: postgres:15
    container_name: church_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: churchdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  init:
    image: node:20
    container_name: backend_init
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: >
      sh -c "
        npm install &&
        npm run admin:bootstrap
      "
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: churchdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      AUTH0_DOMAIN: dev-ohuspam6fnmh4tgt.us.auth0.com
      AUTH0_AUDIENCE: logger
      AUTH0_ISSUER: https://dev-ohuspam6fnmh4tgt.us.auth0.com/
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
      ADMIN_EMAIL: hndoss@gmail.com
      ADMIN_USERNAME: "hndoss"
      ADMIN_IDP_ISSUER: https://dev-ohuspam6fnmh4tgt.us.auth0.com/
      ADMIN_IDP_SUBJECT: auth0|688c59c6ec2186db091c74eb
    restart: "no"

  backend:
    image: node:20
    container_name: backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/test:/app/test
      - ./backend/config:/app/config
      - ./backend/scripts:/app/scripts
      - ./backend/package.json:/app/package.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/package-lock.json:/app/package-lock.json
    working_dir: /app
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: churchdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      AUTH0_DOMAIN: dev-ohuspam6fnmh4tgt.us.auth0.com
      AUTH0_AUDIENCE: logger
      AUTH0_ISSUER: https://dev-ohuspam6fnmh4tgt.us.auth0.com/
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
      ADMIN_EMAIL: hndoss@gmail.com
      ADMIN_USERNAME: "hndoss"
      ADMIN_IDP_ISSUER: https://dev-ohuspam6fnmh4tgt.us.auth0.com/
      ADMIN_IDP_SUBJECT: auth0|688c59c6ec2186db091c74eb
    command: >
      sh -c "
        npm install &&
        npx nest build &&
        npx nest start --watch
      "
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3000/health', res => { if (res.statusCode !== 200) process.exit(1); res.resume(); }).on('error', () => process.exit(1));\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: rebuild
          path: ./backend/package.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    stdin_open: true  # Allows attaching for hot reload (press 'r')
    tty: true         # Allocates TTY for interactive commands
    ports:
      - "8080:8080"
    environment:
      - AUTH0_DOMAIN=dev-ohuspam6fnmh4tgt.us.auth0.com
      - AUTH0_CLIENT_ID=2H45P97qEyC9HfiKFj8FOvb8DnSOgFwY
      - AUTH0_REDIRECT_URI=http://localhost:8080
      - AUTH0_AUDIENCE=logger
      - API_BASE_URL=http://localhost:3000
    volumes:
      - ./frontend/lib:/app/lib
      - ./frontend/web:/app/web
      - ./frontend/assets:/app/assets
      - ./frontend/pubspec.yaml:/app/pubspec.yaml
    develop:
      watch:
        - action: sync
          path: ./frontend/lib
          target: /app/lib
        - action: sync
          path: ./frontend/web
          target: /app/web
        - action: rebuild
          path: ./frontend/pubspec.yaml

volumes:
  postgres_data:
