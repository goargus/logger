name: Deploy Frontend Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy-frontend-dev:
    runs-on: ubuntu-latest
    environment: development
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: |
          flutter build web --release \
            --dart-define=AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }} \
            --dart-define=AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }} \
            --dart-define=AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }} \
            --dart-define=REDIRECT_URI=${{ secrets.REDIRECT_URI }} \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=ENTRA_TENANT_ID=${{ secrets.ENTRA_TENANT_ID }} \
            --dart-define=ENTRA_CLIENT_ID=${{ secrets.ENTRA_CLIENT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy frontend/build/web
            --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
            --branch=develop
            --commit-dirty=true
